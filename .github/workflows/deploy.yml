name: CloudChef CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test library
        run: |
          cd library && pip install -e . && pip install pytest
          pytest tests/ -v

  deploy-backend:
    runs-on: ubuntu-latest
    needs: test-library
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Create DynamoDB table
        run: |
          aws dynamodb describe-table --table-name cloudchef-recipes-prod --region eu-west-1 2>/dev/null || \
          aws dynamodb create-table \
            --table-name cloudchef-recipes-prod \
            --attribute-definitions AttributeName=recipeId,AttributeType=S \
            --key-schema AttributeName=recipeId,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region eu-west-1

      - name: Create S3 bucket for images
        run: |
          aws s3api head-bucket --bucket cloudchef-images-prod-kasireddy --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket cloudchef-images-prod-kasireddy \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1

          # Add CORS configuration
          aws s3api put-bucket-cors --bucket cloudchef-images-prod-kasireddy --region eu-west-1 --cors-configuration '{
            "CORSRules": [
              {
                "AllowedHeaders": ["*"],
                "AllowedMethods": ["GET", "PUT", "POST"],
                "AllowedOrigins": ["*"],
                "ExposeHeaders": []
              }
            ]
          }'

      - name: Create IAM role for Lambda
        run: |
          # Check if role exists
          if ! aws iam get-role --role-name cloudchef-lambda-role 2>/dev/null; then
            echo "Creating IAM role..."
            aws iam create-role \
              --role-name cloudchef-lambda-role \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": {
                      "Service": "lambda.amazonaws.com"
                    },
                    "Action": "sts:AssumeRole"
                  }
                ]
              }'

            # Attach policies
            aws iam attach-role-policy --role-name cloudchef-lambda-role \
              --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess
            aws iam attach-role-policy --role-name cloudchef-lambda-role \
              --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess
            aws iam attach-role-policy --role-name cloudchef-lambda-role \
              --policy-arn arn:aws:iam::aws:policy/AmazonRekognitionFullAccess
            aws iam attach-role-policy --role-name cloudchef-lambda-role \
              --policy-arn arn:aws:iam::aws:policy/TranslateFullAccess
            aws iam attach-role-policy --role-name cloudchef-lambda-role \
              --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
          else
            echo "IAM role already exists, skipping creation."
          fi

      - name: Wait for IAM propagation
        run: sleep 10

      - name: Package Lambda function
        run: cd backend && zip -r ../lambda.zip lambda_function.py

      - name: Deploy Lambda function
        run: |
          ROLE_ARN=$(aws iam get-role --role-name cloudchef-lambda-role --query 'Role.Arn' --output text)

          # Check if function exists
          if aws lambda get-function --function-name cloudchef-api --region eu-west-1 2>/dev/null; then
            echo "Updating existing Lambda function..."
            aws lambda update-function-code \
              --function-name cloudchef-api \
              --zip-file fileb://lambda.zip \
              --region eu-west-1

            # Wait for update to complete before updating configuration
            aws lambda wait function-updated --function-name cloudchef-api --region eu-west-1

            aws lambda update-function-configuration \
              --function-name cloudchef-api \
              --runtime python3.11 \
              --handler lambda_function.lambda_handler \
              --role "$ROLE_ARN" \
              --memory-size 256 \
              --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=cloudchef-recipes-prod,S3_BUCKET=cloudchef-images-prod-kasireddy,REGION=eu-west-1}" \
              --region eu-west-1
          else
            echo "Creating new Lambda function..."
            aws lambda create-function \
              --function-name cloudchef-api \
              --runtime python3.11 \
              --handler lambda_function.lambda_handler \
              --role "$ROLE_ARN" \
              --zip-file fileb://lambda.zip \
              --memory-size 256 \
              --timeout 30 \
              --environment "Variables={DYNAMODB_TABLE=cloudchef-recipes-prod,S3_BUCKET=cloudchef-images-prod-kasireddy,REGION=eu-west-1}" \
              --region eu-west-1
          fi

      - name: Setup API Gateway
        run: |
          # Get or create API
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='cloudchef-api'].id" --output text --region eu-west-1)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name cloudchef-api --endpoint-configuration types=REGIONAL --query 'id' --output text --region eu-west-1)
          fi

          # Get root resource id
          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text --region eu-west-1)

          # Check if proxy resource exists
          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?pathPart=='{proxy+}'].id" --output text --region eu-west-1)
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part '{proxy+}' --query 'id' --output text --region eu-west-1)
          fi

          # Get Lambda ARN
          LAMBDA_ARN=$(aws lambda get-function --function-name cloudchef-api --query 'Configuration.FunctionArn' --output text --region eu-west-1)

          # Put methods (ANY on proxy, ANY on root, OPTIONS on proxy for CORS)
          # Use || true to handle "already exists" errors
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --authorization-type NONE --request-parameters "method.request.path.proxy=true" --region eu-west-1 2>/dev/null || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations" --region eu-west-1

          # OPTIONS for CORS on proxy
          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --authorization-type NONE --region eu-west-1 2>/dev/null || true

          aws apigateway put-method-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters "method.response.header.Access-Control-Allow-Headers=true,method.response.header.Access-Control-Allow-Methods=true,method.response.header.Access-Control-Allow-Origin=true" --region eu-west-1 2>/dev/null || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --type MOCK --request-templates '{"application/json": "{\"statusCode\": 200}"}' --region eu-west-1

          aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}' --region eu-west-1

          # Root resource ANY
          aws apigateway put-method --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --authorization-type NONE --region eu-west-1 2>/dev/null || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations" --region eu-west-1

          # Lambda permission for API Gateway
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission --function-name cloudchef-api --statement-id apigateway-access --action lambda:InvokeFunction --principal apigateway.amazonaws.com --source-arn "arn:aws:execute-api:eu-west-1:${ACCOUNT_ID}:${API_ID}/*" --region eu-west-1 2>/dev/null || true

          # Deploy
          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region eu-west-1

          echo "API_URL=https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod" >> $GITHUB_ENV

      - name: Output API URL
        run: echo "Backend API URL - $API_URL"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Get API Gateway URL
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='cloudchef-api'].id" --output text --region eu-west-1)
          API_URL="https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod"
          echo "VITE_API_URL=${API_URL}" >> $GITHUB_ENV

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && VITE_API_URL=${{ env.VITE_API_URL }} npm run build

      - name: Create S3 bucket for frontend
        run: |
          aws s3api head-bucket --bucket cloudchef-frontend-prod-kasireddy --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket cloudchef-frontend-prod-kasireddy \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1

      - name: Configure S3 static website hosting
        run: |
          aws s3 website s3://cloudchef-frontend-prod-kasireddy \
            --index-document index.html \
            --error-document index.html \
            --region eu-west-1

      - name: Disable S3 Block Public Access
        run: |
          aws s3api put-public-access-block \
            --bucket cloudchef-frontend-prod-kasireddy \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false" \
            --region eu-west-1

      - name: Set bucket policy for public read access
        run: |
          aws s3api put-bucket-policy --bucket cloudchef-frontend-prod-kasireddy --region eu-west-1 --policy '{
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::cloudchef-frontend-prod-kasireddy/*"
              }
            ]
          }'

      - name: Deploy frontend to S3
        run: aws s3 sync frontend/dist/ s3://cloudchef-frontend-prod-kasireddy --delete --region eu-west-1

      - name: Output website URL
        run: echo "Frontend URL - http://cloudchef-frontend-prod-kasireddy.s3-website-eu-west-1.amazonaws.com"
