name: SmartPantry CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-library:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install and test library
        run: |
          cd library && pip install -e . && pip install pytest
          pytest tests/ -v

  deploy-backend:
    runs-on: ubuntu-latest
    needs: test-library
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Create DynamoDB tables
        run: |
          aws dynamodb describe-table --table-name SmartPantryUsers --region eu-west-1 2>/dev/null || \
          aws dynamodb create-table \
            --table-name SmartPantryUsers \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region eu-west-1

          aws dynamodb describe-table --table-name SmartPantryItems --region eu-west-1 2>/dev/null || \
          aws dynamodb create-table \
            --table-name SmartPantryItems \
            --attribute-definitions AttributeName=id,AttributeType=S \
            --key-schema AttributeName=id,KeyType=HASH \
            --billing-mode PAY_PER_REQUEST \
            --region eu-west-1

      - name: Create S3 bucket for images
        run: |
          aws s3api head-bucket --bucket smartpantry-images-kasireddy --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket smartpantry-images-kasireddy \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1

          aws s3api put-bucket-cors --bucket smartpantry-images-kasireddy --region eu-west-1 --cors-configuration '{
            "CORSRules": [
              {
                "AllowedHeaders": ["*"],
                "AllowedMethods": ["GET", "PUT", "POST"],
                "AllowedOrigins": ["*"],
                "ExposeHeaders": []
              }
            ]
          }'

          aws s3api put-public-access-block \
            --bucket smartpantry-images-kasireddy \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false" \
            --region eu-west-1

          aws s3api put-bucket-policy --bucket smartpantry-images-kasireddy --region eu-west-1 --policy '{
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::smartpantry-images-kasireddy/*"
              }
            ]
          }'

      - name: Create IAM role for Lambda
        run: |
          if ! aws iam get-role --role-name smartpantry-lambda-role 2>/dev/null; then
            aws iam create-role \
              --role-name smartpantry-lambda-role \
              --assume-role-policy-document '{
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": { "Service": "lambda.amazonaws.com" },
                    "Action": "sts:AssumeRole"
                  }
                ]
              }'
          fi

          aws iam attach-role-policy --role-name smartpantry-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonDynamoDBFullAccess 2>/dev/null || true
          aws iam attach-role-policy --role-name smartpantry-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonS3FullAccess 2>/dev/null || true
          aws iam attach-role-policy --role-name smartpantry-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonRekognitionFullAccess 2>/dev/null || true
          aws iam attach-role-policy --role-name smartpantry-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/AmazonSNSFullAccess 2>/dev/null || true
          aws iam attach-role-policy --role-name smartpantry-lambda-role \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole 2>/dev/null || true

      - name: Create SNS topic
        run: |
          SNS_TOPIC_ARN=$(aws sns create-topic --name SmartPantryExpiryAlerts --region eu-west-1 --query 'TopicArn' --output text)
          echo "SNS_TOPIC_ARN=$SNS_TOPIC_ARN" >> $GITHUB_ENV

      - name: Wait for IAM propagation
        run: sleep 10

      - name: Package Lambda function
        run: cd backend && zip -r ../lambda.zip lambda_function.py

      - name: Deploy Lambda function
        run: |
          ROLE_ARN=$(aws iam get-role --role-name smartpantry-lambda-role --query 'Role.Arn' --output text)

          if aws lambda get-function --function-name SmartPantryFunction --region eu-west-1 2>/dev/null; then
            aws lambda update-function-code \
              --function-name SmartPantryFunction \
              --zip-file fileb://lambda.zip \
              --region eu-west-1

            aws lambda wait function-updated --function-name SmartPantryFunction --region eu-west-1

            aws lambda update-function-configuration \
              --function-name SmartPantryFunction \
              --runtime python3.11 \
              --handler lambda_function.lambda_handler \
              --role "$ROLE_ARN" \
              --memory-size 256 \
              --timeout 30 \
              --environment "Variables={S3_BUCKET=smartpantry-images-kasireddy,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},JWT_SECRET=smartpantry-secret-key-2026}" \
              --region eu-west-1
          else
            aws lambda create-function \
              --function-name SmartPantryFunction \
              --runtime python3.11 \
              --handler lambda_function.lambda_handler \
              --role "$ROLE_ARN" \
              --zip-file fileb://lambda.zip \
              --memory-size 256 \
              --timeout 30 \
              --environment "Variables={S3_BUCKET=smartpantry-images-kasireddy,SNS_TOPIC_ARN=${{ env.SNS_TOPIC_ARN }},JWT_SECRET=smartpantry-secret-key-2026}" \
              --region eu-west-1
          fi

      - name: Setup API Gateway
        run: |
          API_ID=$(aws apigateway get-rest-apis --query "items[?name=='smartpantry-api'].id" --output text --region eu-west-1)
          if [ -z "$API_ID" ] || [ "$API_ID" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name smartpantry-api --endpoint-configuration types=REGIONAL --query 'id' --output text --region eu-west-1)
          fi

          ROOT_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?path=='/'].id" --output text --region eu-west-1)

          PROXY_ID=$(aws apigateway get-resources --rest-api-id $API_ID --query "items[?pathPart=='{proxy+}'].id" --output text --region eu-west-1)
          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id $API_ID --parent-id $ROOT_ID --path-part '{proxy+}' --query 'id' --output text --region eu-west-1)
          fi

          LAMBDA_ARN=$(aws lambda get-function --function-name SmartPantryFunction --query 'Configuration.FunctionArn' --output text --region eu-west-1)

          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --authorization-type NONE --request-parameters "method.request.path.proxy=true" --region eu-west-1 2>/dev/null || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations" --region eu-west-1

          aws apigateway put-method --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --authorization-type NONE --region eu-west-1 2>/dev/null || true

          aws apigateway put-method-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters "method.response.header.Access-Control-Allow-Headers=true,method.response.header.Access-Control-Allow-Methods=true,method.response.header.Access-Control-Allow-Origin=true" --region eu-west-1 2>/dev/null || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --type MOCK --request-templates '{"application/json": "{\"statusCode\": 200}"}' --region eu-west-1

          aws apigateway put-integration-response --rest-api-id $API_ID --resource-id $PROXY_ID --http-method OPTIONS --status-code 200 --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}' --region eu-west-1

          aws apigateway put-method --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --authorization-type NONE --region eu-west-1 2>/dev/null || true

          aws apigateway put-integration --rest-api-id $API_ID --resource-id $ROOT_ID --http-method ANY --type AWS_PROXY --integration-http-method POST --uri "arn:aws:apigateway:eu-west-1:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations" --region eu-west-1

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          aws lambda add-permission --function-name SmartPantryFunction --statement-id apigateway-access --action lambda:InvokeFunction --principal apigateway.amazonaws.com --source-arn "arn:aws:execute-api:eu-west-1:${ACCOUNT_ID}:${API_ID}/*" --region eu-west-1 2>/dev/null || true

          aws apigateway create-deployment --rest-api-id $API_ID --stage-name prod --region eu-west-1

          echo "API_URL=https://${API_ID}.execute-api.eu-west-1.amazonaws.com/prod" >> $GITHUB_ENV

      - name: Output API URL
        run: echo "Backend API URL - $API_URL"

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Create S3 bucket for frontend
        run: |
          aws s3api head-bucket --bucket smartpantry-frontend-prod-kasireddy --region eu-west-1 2>/dev/null || \
          aws s3api create-bucket \
            --bucket smartpantry-frontend-prod-kasireddy \
            --region eu-west-1 \
            --create-bucket-configuration LocationConstraint=eu-west-1

      - name: Configure S3 static website hosting
        run: |
          aws s3 website s3://smartpantry-frontend-prod-kasireddy \
            --index-document index.html \
            --error-document index.html \
            --region eu-west-1

      - name: Disable S3 Block Public Access
        run: |
          aws s3api put-public-access-block \
            --bucket smartpantry-frontend-prod-kasireddy \
            --public-access-block-configuration "BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false" \
            --region eu-west-1

      - name: Set bucket policy for public read access
        run: |
          aws s3api put-bucket-policy --bucket smartpantry-frontend-prod-kasireddy --region eu-west-1 --policy '{
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::smartpantry-frontend-prod-kasireddy/*"
              }
            ]
          }'

      - name: Deploy frontend to S3
        run: aws s3 sync frontend/dist/ s3://smartpantry-frontend-prod-kasireddy --delete --region eu-west-1

      - name: Output website URL
        run: echo "Frontend URL - http://smartpantry-frontend-prod-kasireddy.s3-website-eu-west-1.amazonaws.com"

  # NOTE: The library is already published on PyPI as
  # https://pypi.org/project/recipe-manager-nci/ (v1.0.0, uploaded
  # 2026-03-27). Re-publishing on every CI run is unnecessary and was
  # previously failing because no PYPI_TOKEN secret is configured.
  # The publish step has been intentionally removed; the library code
  # in /library/ remains the canonical source.
