AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: SmartPantry - Kitchen Inventory Tracker

Globals:
  Function:
    Timeout: 30
    Runtime: python3.9
    MemorySize: 256

Resources:
  # DynamoDB Tables
  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SmartPantryUsers
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  ItemsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SmartPantryItems
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  # S3 Bucket for images
  ImagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: smartpantry-images-kasireddy
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT, POST]
            AllowedOrigins: ["*"]

  # SNS Topic
  ExpiryNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: SmartPantryExpiryAlerts

  # Lambda Function
  SmartPantryFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SmartPantryFunction
      Handler: lambda_function.lambda_handler
      CodeUri: .
      Environment:
        Variables:
          S3_BUCKET: !Ref ImagesBucket
          SNS_TOPIC_ARN: !Ref ExpiryNotificationTopic
          JWT_SECRET: smartpantry-secret-key-2026
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref ItemsTable
        - S3CrudPolicy:
            BucketName: !Ref ImagesBucket
        - RekognitionDetectOnlyPolicy: {}
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt ExpiryNotificationTopic.TopicName
      Events:
        ProxyApi:
          Type: Api
          Properties:
            Path: /{proxy+}
            Method: ANY
            RestApiId: !Ref SmartPantryApi

  # API Gateway
  SmartPantryApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
        AllowOrigin: "'*'"

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${SmartPantryApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
  ImagesBucketName:
    Description: S3 bucket for images
    Value: !Ref ImagesBucket
  SNSTopicArn:
    Description: SNS Topic ARN
    Value: !Ref ExpiryNotificationTopic
